<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>EPUB Reader</title>
  <style>
    :root {
      color-scheme: light dark;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fbfbfd;
    }

    body[data-theme="dark"] {
      background: #111214;
    }

    #reader {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: transparent;
    }
  </style>
</head>
<body>
  <div id="reader"></div>
  <script src="epub.min.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const opf = params.get("opf");
    const initialLocation = params.get("loc");
    let initialTheme = params.get("theme") || "light";
    let activeTheme = initialTheme === "dark" ? "dark" : "light";
    let activeBook = null;
    let activeRendition = null;

    document.body.dataset.theme = activeTheme;

    function postMessage(name, payload) {
      try {
        window.webkit?.messageHandlers?.[name]?.postMessage(payload);
      } catch (_) {
      }
    }

    function themeRules(activeTheme) {
      if (activeTheme === "dark") {
        return {
          body: {
            "background": "#111214 !important",
            "color": "#f5f5f7 !important",
            "line-height": "1.6 !important"
          },
          p: {
            "line-height": "1.6 !important"
          },
          a: {
            "color": "#8ab4ff !important"
          },
          img: {
            "max-width": "100% !important",
            "height": "auto !important"
          }
        };
      }

      return {
        body: {
          "background": "#fbfbfd !important",
          "color": "#141517 !important",
          "line-height": "1.6 !important"
        },
        p: {
          "line-height": "1.6 !important"
        },
        a: {
          "color": "#2563eb !important"
        },
        img: {
          "max-width": "100% !important",
          "height": "auto !important"
        }
      };
    }

    function applyTheme(nextTheme) {
      activeTheme = nextTheme === "dark" ? "dark" : "light";
      document.body.dataset.theme = activeTheme;
      if (activeRendition) {
        activeRendition.themes.default(themeRules(activeTheme));
        activeRendition.themes.select("default");
      }
    }

    window.__yacreaderUpdateTheme = function(nextTheme) {
      applyTheme(nextTheme);
    };

    async function boot() {
      if (!opf) {
        postMessage("epubReaderError", "Missing EPUB package document.");
        return;
      }

      try {
        const book = ePub(opf);
        const rendition = book.renderTo("reader", {
          width: "100%",
          height: "100%",
          spread: "none",
          manager: "continuous",
          flow: "scrolled-doc",
          allowScriptedContent: false
        });

        activeBook = book;
        activeRendition = rendition;
        applyTheme(activeTheme);

        rendition.on("relocated", function(location) {
          const cfi = location?.start?.cfi || "";
          postMessage("epubLocationChanged", cfi);
        });

        rendition.on("displayError", function(error) {
          postMessage("epubReaderError", error?.message || "The EPUB could not be displayed.");
        });

        rendition.on("rendered", function() {
          const scroller = document.querySelector("#reader iframe");
          if (scroller && scroller.contentDocument && scroller.contentDocument.body) {
            scroller.contentDocument.body.style.webkitTapHighlightColor = "transparent";
          }
        });

        await book.ready;
        await rendition.display(initialLocation || undefined);
      } catch (error) {
        postMessage("epubReaderError", error?.message || String(error));
      }
    }

    window.addEventListener("error", function(event) {
      if (event?.message) {
        postMessage("epubReaderError", event.message);
      }
    });

    boot();
  </script>
</body>
</html>
